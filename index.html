<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atmospheric: Weather Synth</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: sans-serif; text-align: center; padding-top: 50px; }
        #dashboard { border: 1px solid #444; display: inline-block; padding: 20px; border-radius: 8px; background: #222; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .data { margin: 15px 0; font-family: monospace; color: #00ffcc; }
    </style>
</head>
<body>
    <h1>Weather Synth</h1>
    <div id="dashboard">
        <input type="text" id="cityInput" placeholder="Enter City (e.g., London)">
        <button id="startBtn">Fetch & Play</button>
        <div class="data" id="weatherDisplay">Awaiting data...</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
